repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint (ruff check)
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: Format (ruff format --check)
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: basedpyright
        name: Type check (basedpyright)
        entry: uv run basedpyright
        language: system
        pass_filenames: false
        always_run: true
